<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语选词填空 — DuckLing</title>
<link rel="icon" type="image/jpeg" href="../../imgs/index/avatar.jpg">
<style>
/* ═══════════════════════════════════════════════════════ */
/*                  Global & CSS Variables                */
/* ═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }

:root {
  --bg: #08080a;
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #636366;
  --surface: #111114;
  --surface-raised: #1a1a1e;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.14);
  --radius: 28px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --transition: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  --transition-fast: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
  --correct: #39d353;
  --wrong: #f85149;
  --accent: #f5f5f7;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", "Consolas", monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════════════════════════════ */
/*                     Animations                         */
/* ═══════════════════════════════════════════════════════ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes slideDown {
  from { opacity: 0; max-height: 0; transform: translateY(-8px); }
  to   { opacity: 1; max-height: 400px; transform: translateY(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

.anim-1 { opacity: 0; animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.05s forwards; }
.anim-2 { opacity: 0; animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s forwards; }
.anim-3 { opacity: 0; animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }
.anim-4 { opacity: 0; animation: fadeIn   0.6s cubic-bezier(0.16,1,0.3,1) 0.6s forwards; }

/* ═══════════════════════════════════════════════════════ */
/*                       Layout                           */
/* ═══════════════════════════════════════════════════════ */
.main {
  position: relative; z-index: 1;
  width: 100%; max-width: 860px;
  margin: 0 auto; padding: 40px 32px 80px;
  display: flex; flex-direction: column; gap: 32px;
}

/* ── Top Bar ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--text-secondary); text-decoration: none;
  font-size: 0.9rem; font-weight: 500;
  transition: color var(--transition);
}
.back-link:hover { color: var(--text-primary); }
.back-link svg { width: 16px; height: 16px; transition: transform var(--transition); }
.back-link:hover svg { transform: translateX(-3px); }

.page-title {
  font-size: 1.2rem; font-weight: 600;
  letter-spacing: -0.01em;
  position: absolute; left: 50%; transform: translateX(-50%);
}

.settings-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 100px;
  font-size: 0.88rem; font-weight: 500; font-family: inherit;
  color: var(--text-secondary); background: transparent;
  border: 1px solid var(--border); cursor: pointer;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.settings-toggle:hover {
  color: var(--text-primary); border-color: var(--border-hover);
  background: rgba(255,255,255,0.04);
}
.settings-toggle svg { width: 16px; height: 16px; }

/* ── Settings Panel ── */
.settings-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  display: none;
}
.settings-panel.open { display: block; animation: slideDown 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.settings-inner { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }

.setting-group { display: flex; flex-direction: column; gap: 10px; }
.setting-label {
  font-size: 0.8rem; font-weight: 500; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.type-options { display: flex; gap: 10px; flex-wrap: wrap; }
.type-btn {
  padding: 10px 22px; border-radius: 100px;
  font-size: 0.9rem; font-weight: 500; font-family: inherit;
  color: var(--text-secondary); background: transparent;
  border: 1px solid var(--border); cursor: pointer;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.type-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
.type-btn.active {
  color: var(--bg); background: var(--accent); border-color: var(--accent);
}

.count-row { display: flex; align-items: center; gap: 12px; }
.count-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); font-size: 1.2rem; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.count-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
.count-btn:active { background: rgba(255,255,255,0.06); }
.count-display {
  font-size: 1.5rem; font-weight: 600; font-family: var(--font-mono);
  color: var(--text-primary); min-width: 48px; text-align: center;
}

.start-btn {
  align-self: flex-start;
  padding: 12px 32px; border-radius: 100px;
  font-size: 0.95rem; font-weight: 600; font-family: inherit;
  color: var(--bg); background: var(--accent);
  border: none; cursor: pointer;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.start-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.start-btn:active { transform: scale(0.97); }

/* ── Score Bar (after submit) ── */
.score-bar {
  display: none; align-items: center; gap: 12px;
  padding: 16px 24px; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid var(--border);
}
.score-bar.visible { display: flex; }
.score-text { font-size: 1.1rem; font-weight: 600; }
.score-text.perfect { color: var(--correct); }
.score-text.good { color: #f0c040; }
.score-text.ok { color: var(--wrong); }

/* ═══════════════════════════════════════════════════════ */
/*                 Sticky Header                          */
/* ═══════════════════════════════════════════════════════ */
.sticky-header {
  position: sticky; top: 0; z-index: 100;
  margin: -24px -32px 0;
  padding: 24px 32px 14px 32px;
}
.sticky-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(8, 8, 10, 0.72);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  pointer-events: none;
  z-index: 0;
}
.sticky-header > * { position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════════════ */
/*                    Word Bank                           */
/* ═══════════════════════════════════════════════════════ */
.word-bank-section { display: none; }
.word-bank-section.visible { display: block; }

.word-bank {
  position: relative; z-index: 1;
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px 20px; border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  min-height: 56px; align-items: center;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.word-bank.highlight {
  border-color: rgba(255,255,255,0.2);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}
.word-bank.empty-state {
  justify-content: center;
}
.word-bank .empty-hint {
  color: var(--text-tertiary); font-size: 0.85rem;
  font-style: italic;
}

.chip {
  display: inline-flex; align-items: center;
  padding: 9px 18px; border-radius: 100px;
  font-size: 0.92rem; font-weight: 500; font-family: var(--font);
  color: var(--text-primary); background: var(--surface-raised);
  border: 1px solid var(--border); cursor: grab;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast), opacity var(--transition-fast);
  user-select: none; -webkit-user-drag: none;
  touch-action: none;
  white-space: nowrap;
}
.chip:hover {
  border-color: var(--border-hover);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}
.chip:active { cursor: grabbing; }
.chip.dragging {
  opacity: 0.4; transform: scale(0.95);
}
.chip.used { display: none; }

/* ── Floating drag clone ── */
.drag-clone {
  position: fixed; z-index: 9999; pointer-events: none;
  display: inline-flex; align-items: center;
  padding: 10px 20px; border-radius: 100px;
  font-size: 0.95rem; font-weight: 500; font-family: var(--font);
  color: var(--text-primary); background: #222228;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  transform: translate(-50%, -50%) scale(1.08);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════ */
/*                   Questions                            */
/* ═══════════════════════════════════════════════════════ */
.questions-section { display: none; }
.questions-section.visible { display: block; }

.question-list { display: flex; flex-direction: column; gap: 28px; }

.question-card {
  padding: 24px 28px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  transition: border-color var(--transition-fast);
}
.question-card.correct-card { border-color: rgba(57,211,83,0.3); }
.question-card.wrong-card { border-color: rgba(248,81,73,0.3); }

.q-index {
  font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary);
  letter-spacing: 0.06em; margin-bottom: 10px;
}
.q-sentence {
  font-size: 1.08rem; line-height: 1.8; color: var(--text-primary);
  letter-spacing: 0.01em;
}

/* ── Blank slot ── */
.blank-slot {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 80px; height: 32px;
  margin: 0 4px; vertical-align: middle;
  border-bottom: 2px dashed var(--text-tertiary);
  transition: all var(--transition-fast);
  cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.blank-slot.drop-target {
  border-bottom-color: var(--accent);
  box-shadow: 0 2px 12px rgba(255,255,255,0.1);
  min-width: 100px;
}
.blank-slot.filled {
  border-bottom-style: solid; border-bottom-color: var(--text-secondary);
  cursor: pointer; min-width: auto; padding: 0 8px;
}
.blank-slot .filled-word {
  font-weight: 600; color: var(--text-primary);
  font-size: 1.02rem;
}
.blank-slot.correct-slot {
  border-bottom-color: var(--correct);
}
.blank-slot.correct-slot .filled-word { color: var(--correct); }
.blank-slot.wrong-slot {
  border-bottom-color: var(--wrong);
}
.blank-slot.wrong-slot .filled-word {
  color: var(--wrong); text-decoration: line-through;
}
.blank-answer-reveal {
  display: none; font-size: 0.8rem; color: var(--correct);
  font-weight: 500; margin-left: 4px;
}
.blank-answer-reveal.visible { display: inline; }

/* ── Post-submit info ── */
.q-translation {
  display: none; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 0.88rem; color: var(--text-secondary);
  line-height: 1.6;
}
.q-translation.visible { display: block; animation: fadeIn 0.4s ease forwards; }
.q-hint { display: none; font-size: 0.8rem; color: var(--text-tertiary); margin-top: 4px; }
.q-hint.visible { display: block; }

/* ═══════════════════════════════════════════════════════ */
/*                   Submit / Actions                     */
/* ═══════════════════════════════════════════════════════ */
.actions { display: none; justify-content: center; gap: 16px; }
.actions.visible { display: flex; }

.submit-btn, .restart-btn {
  padding: 14px 40px; border-radius: 100px;
  font-size: 1rem; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all var(--transition);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.submit-btn {
  color: var(--bg); background: var(--accent); border: none;
}
.submit-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
.submit-btn:active:not(:disabled) { transform: scale(0.97); }
.submit-btn:disabled {
  opacity: 0.3; cursor: not-allowed;
}
.restart-btn {
  color: var(--text-primary); background: transparent;
  border: 1px solid var(--border);
}
.restart-btn:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.04); }
.restart-btn:active { transform: scale(0.97); }

/* ═══════════════════════════════════════════════════════ */
/*                   Footer                               */
/* ═══════════════════════════════════════════════════════ */
.footer {
  display: none; font-size: 0.8rem; color: var(--text-tertiary);
  text-align: center; padding-top: 16px;
}
.footer.visible { display: block; }

/* ═══════════════════════════════════════════════════════ */
/*                   Responsive                           */
/* ═══════════════════════════════════════════════════════ */
@media (max-width: 720px) {
  .main { padding: 24px 16px 60px; gap: 24px; }
  .page-title { position: static; transform: none; font-size: 1rem; }
  .top-bar { justify-content: space-between; }
  .settings-inner { padding: 20px 20px; }
  .q-sentence { font-size: 0.98rem; line-height: 1.7; }
  .question-card { padding: 18px 16px; }
  .blank-slot { min-width: 60px; height: 28px; }
  .sticky-header { margin: -12px -16px 0; padding: 12px 16px 10px 16px; }
  .word-bank { padding: 12px 12px; gap: 8px; }
  .chip { padding: 7px 14px; font-size: 0.85rem; }
  .type-options { gap: 6px; }
  .type-btn { padding: 8px 16px; font-size: 0.82rem; }
  .submit-btn, .restart-btn { padding: 12px 32px; font-size: 0.92rem; }
}
</style>
</head>

  <!-- ═══ Sticky Header: top bar + settings + score + word bank ═══ -->
  <div class="sticky-header" id="stickyHeader">

  <!-- Top Bar -->
  <div class="top-bar anim-1">
    <a class="back-link" href="../index.html">

    </button>

  <!-- Settings Panel -->
  <div class="settings-panel open anim-2" id="settingsPanel">
    <div class="settings-inner">
      <div class="setting-group">
        <span class="setting-label">题目类型</span>
        <div class="type-options" id="typeOptions">
          <button class="type-btn active" data-type="mixed" onclick="setType('mixed', this)">混合模式</button>
          <button class="type-btn" data-type="word" onclick="setType('word', this)">选词填空</button>
          <button class="type-btn" data-type="phrase" onclick="setType('phrase', this)">短语填空</button>
          <button class="type-btn" data-type="word-unit" onclick="setType('word-unit', this)">词汇按单元</button>
          <button class="type-btn" data-type="phrase-unit" onclick="setType('phrase-unit', this)">短语按单元</button>
        </div>
      </div>
      <div class="setting-group" id="unitGroup" style="display:none">
        <span class="setting-label">选择单元</span>
        <div class="type-options" id="unitOptions">
          <button class="type-btn" data-unit="2" onclick="setUnit(2, this)">Unit 2</button>
          <button class="type-btn" data-unit="3" onclick="setUnit(3, this)">Unit 3</button>
          <button class="type-btn" data-unit="4" onclick="setUnit(4, this)">Unit 4</button>
          <button class="type-btn" data-unit="5" onclick="setUnit(5, this)">Unit 5</button>
        </div>
      </div>
      <div class="setting-group">
        <span class="setting-label" id="countLabel">题目数量</span>
        <div class="count-row">
          <button class="count-btn" id="countMinus" onclick="adjustCount(-1)" aria-label="减少">−</button>
          <span class="count-display" id="countDisplay">10</span>
          <button class="count-btn" id="countPlus" onclick="adjustCount(1)" aria-label="增加">+</button>
        </div>
      </div>
      <button class="start-btn anim-3" onclick="startQuiz()">开始练习</button>
    </div>
  </div>

  <!-- Score Bar -->
  <div class="score-bar" id="scoreBar">
    <span class="score-text" id="scoreText"></span>
  </div>

  <!-- Word Bank -->
  <div class="word-bank-section anim-2" id="wordBankSection">
    <div class="word-bank" id="wordBank"></div>
  </div>

  </div><!-- /sticky-header -->

  <!-- Questions -->
  <div class="questions-section anim-3" id="questionsSection">
    <div class="question-list" id="questionList"></div>
  </div>

  <!-- Actions -->
  <div class="actions anim-4" id="actions">
    <button class="submit-btn" id="submitBtn" onclick="submitAnswers()">提交答案</button>
    <button class="restart-btn" id="restartBtn" style="display:none" onclick="restartQuiz()">重新开始</button>
  </div>

  <footer class="footer anim-4" id="footer">
    &copy; 2026 DuckLing
  </footer>

</main>

/*                   Question Data                        */

const ALL_QUESTIONS = [

  dragInfo: null          // {word, sourceEl, cloneEl, startX, startY}
};

/* ═══════════════════════════════════════════════════════ */
/*                   Settings                             */
/* ═══════════════════════════════════════════════════════ */
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
}

function setType(type, btn) {
  state.questionType = type;
  document.querySelectorAll('#typeOptions .type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const isUnitMode = (type === 'word-unit' || type === 'phrase-unit');
  const unitGroup = document.getElementById('unitGroup');
  const countMinus = document.getElementById('countMinus');
  const countPlus = document.getElementById('countPlus');
  const countDisplay = document.getElementById('countDisplay');
  const countLabel = document.getElementById('countLabel');

  if (isUnitMode) {
    unitGroup.style.display = '';
    // Reset unit selection
    state.selectedUnit = null;
    document.querySelectorAll('#unitOptions .type-btn').forEach(b => b.classList.remove('active'));
    // Show actual question count for the type (all units), disable adjustment
    const filterType = type === 'word-unit' ? 'word' : 'phrase';
    const total = ALL_QUESTIONS.filter(q => q.type === filterType).length;
    countDisplay.textContent = '—';
    countMinus.style.opacity = '0.3'; countMinus.style.pointerEvents = 'none';
    countPlus.style.opacity = '0.3'; countPlus.style.pointerEvents = 'none';
    countLabel.textContent = '题目数量（选择单元后显示）';
    state.questionCount = 0;
  } else {
    unitGroup.style.display = 'none';
    state.selectedUnit = null;
    countMinus.style.opacity = ''; countMinus.style.pointerEvents = '';
    countPlus.style.opacity = ''; countPlus.style.pointerEvents = '';
    countLabel.textContent = '题目数量';
    if (state.questionCount === 0) state.questionCount = 10;
    countDisplay.textContent = state.questionCount;
  }
}

function setUnit(unit, btn) {
  state.selectedUnit = unit;
  document.querySelectorAll('#unitOptions .type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Compute actual question count for this type + unit
  const filterType = state.questionType === 'word-unit' ? 'word' : 'phrase';
  const matching = ALL_QUESTIONS.filter(q => q.type === filterType && q.unit === unit);
  state.questionCount = matching.length;
  document.getElementById('countDisplay').textContent = state.questionCount;
  document.getElementById('countLabel').textContent = '题目数量（共 ' + state.questionCount + ' 题）';
}

function adjustCount(delta) {
  // Disabled for unit-based modes
  if (state.questionType === 'word-unit' || state.questionType === 'phrase-unit') return;
  const newCount = state.questionCount + delta;
  if (newCount >= 5 && newCount <= 30) {
    state.questionCount = newCount;
    document.getElementById('countDisplay').textContent = newCount;
  }
}

/* ═══════════════════════════════════════════════════════ */
/*                   Start Quiz                           */
/* ═══════════════════════════════════════════════════════ */
function startQuiz() {
  // Reset state
  state.submitted = false;
  state.dragInfo = null;

  // Validate unit selection for unit-based modes
  if ((state.questionType === 'word-unit' || state.questionType === 'phrase-unit') && !state.selectedUnit) {
    alert('请先选择一个单元');
    return;
  }
  if (state.questionCount === 0) {
    alert('该模式下没有可用题目，请切换模式');
    return;
  }

  // Filter questions by type (and unit if applicable)
  let pool = ALL_QUESTIONS;
  if (state.questionType === 'word') {
    pool = ALL_QUESTIONS.filter(q => q.type === 'word');
  } else if (state.questionType === 'phrase') {
    pool = ALL_QUESTIONS.filter(q => q.type === 'phrase');
  } else if (state.questionType === 'word-unit') {
    pool = ALL_QUESTIONS.filter(q => q.type === 'word' && q.unit === state.selectedUnit);
  } else if (state.questionType === 'phrase-unit') {
    pool = ALL_QUESTIONS.filter(q => q.type === 'phrase' && q.unit === state.selectedUnit);
  }

  // For unit-based modes, show ALL questions (no shuffle-to-limit)
  if (state.questionType === 'word-unit' || state.questionType === 'phrase-unit') {
    state.questions = [...pool];
    state.questionCount = state.questions.length;
  } else {

  // Shuffle and pick
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  state.questions = shuffled.slice(0, Math.min(state.questionCount, shuffled.length));
  state.questionCount = state.questions.length;
  }

  // Build flat blanks list
  state.blanks = [];
  state.questions.forEach((q, qi) => {
    q.blanks.forEach((b, bi) => {
      state.blanks.push({ qIndex: qi, bIndex: bi, answer: b.answer, filled: null, correct: null });
    });
  });

  // Build word bank: all correct answers + extra distractors
  const correctWords = state.blanks.map(b => b.answer);
  // Collect distractors from pool (not in current questions)
  const usedIds = new Set(state.questions.map(q => q.blanks.map(b => b.answer).join('|')).join('|'));
  const distractorPool = [];
  pool.forEach(q => {
    q.blanks.forEach(b => {
      if (!correctWords.includes(b.answer)) {
        distractorPool.push(b.answer);
      }
    });
  });
  // Shuffle and pick ~30% extra
  const extraCount = Math.max(2, Math.floor(state.blanks.length * 0.35));
  const shuffledDistractors = [...distractorPool].sort(() => Math.random() - 0.5);
  const distractors = shuffledDistractors.slice(0, extraCount);

  // Combine and shuffle word bank (deduplicate first)
  const allWords = [...new Set([...correctWords, ...distractors])].sort(() => Math.random() - 0.5);
  state.wordBank = allWords.map(w => ({ word: w, used: false }));

  // Collapse settings panel
  document.getElementById('settingsPanel').classList.remove('open');

  // Hide score bar
  document.getElementById('scoreBar').classList.remove('visible');

  // Render
  renderWordBank();
  renderQuestions();
  renderActions();

  // Show sections
  document.getElementById('wordBankSection').classList.add('visible');
  document.getElementById('questionsSection').classList.add('visible');
  document.getElementById('actions').classList.add('visible');
  document.getElementById('footer').classList.add('visible');

  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ═══════════════════════════════════════════════════════ */
/*                   Render Word Bank                     */
/* ═══════════════════════════════════════════════════════ */
function renderWordBank() {
  const bank = document.getElementById('wordBank');
  bank.innerHTML = '';

  const availableWords = state.wordBank.filter(w => !w.used);
  if (availableWords.length === 0) {
    bank.classList.add('empty-state');
    bank.innerHTML = '<span class="empty-hint">所有候选词已放置完毕</span>';
    return;
  }
  bank.classList.remove('empty-state');

  availableWords.forEach((item, idx) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item.word;
    chip.dataset.word = item.word;
    chip.dataset.bankIdx = state.wordBank.indexOf(item);
    chip.addEventListener('pointerdown', onChipPointerDown);
    bank.appendChild(chip);
  });
}

/* ═══════════════════════════════════════════════════════ */
/*                   Render Questions                     */
/* ═══════════════════════════════════════════════════════ */
function renderQuestions() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';

  state.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.qIndex = qi;

    // Post-submit: mark entire question card as correct/wrong
    if (state.submitted) {
      const blankStates = state.blanks.filter(b => b.qIndex === qi);
      const allCorrect = blankStates.length > 0 && blankStates.every(b => b.correct === true);
      card.classList.add(allCorrect ? 'correct-card' : 'wrong-card');
    }

    // Index label
    const idxLabel = document.createElement('div');
    idxLabel.className = 'q-index';
    const typeLabel = q.type === 'word' ? '选词填空' : '短语填空';
    idxLabel.textContent = `第 ${qi + 1} 题 · ${typeLabel} · Unit ${q.unit}`;
    card.appendChild(idxLabel);

    // Sentence
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'q-sentence';

    q.sentenceParts.forEach((part, pi) => {
      if (part === null) {
        // Find which blank this is
        const blankIdx = q.sentenceParts.slice(0, pi).filter(p => p === null).length;
        const blank = q.blanks[blankIdx];
        const flatIdx = state.blanks.findIndex(b => b.qIndex === qi && b.bIndex === blankIdx);

        const slot = document.createElement('span');
        slot.className = 'blank-slot';
        slot.dataset.flatIdx = flatIdx;
        slot.dataset.qIndex = qi;
        slot.dataset.bIndex = blankIdx;
        slot.title = blank.hint || '';

        // Post-submit: add correct/wrong classes
        if (state.submitted && flatIdx >= 0 && state.blanks[flatIdx].correct !== null) {
          slot.classList.add(state.blanks[flatIdx].correct ? 'correct-slot' : 'wrong-slot');
        }

        if (flatIdx >= 0 && state.blanks[flatIdx].filled) {
          slot.classList.add('filled');
          const wordSpan = document.createElement('span');
          wordSpan.className = 'filled-word';
          wordSpan.textContent = state.blanks[flatIdx].filled;
          slot.appendChild(wordSpan);
          slot.addEventListener('click', () => returnWordToBank(flatIdx));
        } else if (!state.submitted) {
          slot.textContent = ' ';
          slot.addEventListener('pointerup', onBlankPointerUp);
        } else {
          slot.textContent = ' ';
        }

        // Post-submit: show answer reveal
        if (state.submitted && flatIdx >= 0) {
          const reveal = document.createElement('span');
          reveal.className = 'blank-answer-reveal';
          reveal.textContent = ' ' + state.blanks[flatIdx].answer;
          if (!state.blanks[flatIdx].filled || state.blanks[flatIdx].filled.toLowerCase().trim() !== state.blanks[flatIdx].answer.toLowerCase().trim()) {
            reveal.classList.add('visible');
          }
          slot.appendChild(reveal);
        }

        sentenceDiv.appendChild(slot);
      } else {
        const textNode = document.createTextNode(part);
        sentenceDiv.appendChild(textNode);
      }
    });

    card.appendChild(sentenceDiv);

    // Hint below sentence
    if (q.blanks.length > 0 && q.blanks[0].hint) {
      const hintDiv = document.createElement('div');
      hintDiv.className = 'q-hint';
      hintDiv.textContent = q.blanks.map(b => b.hint).join(' + ');
      card.appendChild(hintDiv);
    }

    // Translation (hidden until submit)
    const transDiv = document.createElement('div');
    transDiv.className = 'q-translation';
    transDiv.textContent = '💡 ' + q.translation;
    if (state.submitted) transDiv.classList.add('visible');
    card.appendChild(transDiv);

    list.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════ */
/*                   Render Actions                       */
/* ═══════════════════════════════════════════════════════ */
function renderActions() {
  const submitBtn = document.getElementById('submitBtn');
  const restartBtn = document.getElementById('restartBtn');

  if (state.submitted) {
    submitBtn.style.display = 'none';
    restartBtn.style.display = '';
  } else {
    submitBtn.style.display = '';
    restartBtn.style.display = 'none';
  }
}


/* ═══════════════════════════════════════════════════════ */
/*              Drag & Drop (Pointer Events)              */
/* ═══════════════════════════════════════════════════════ */
function onChipPointerDown(e) {
  if (state.submitted) return;
  e.preventDefault();
  e.stopPropagation();

  const chip = e.currentTarget;
  const word = chip.dataset.word;

  // Create drag clone
  const clone = document.createElement('div');
  clone.className = 'drag-clone';
  clone.textContent = word;
  document.body.appendChild(clone);

  // Position clone at cursor
  const rect = chip.getBoundingClientRect();
  clone.style.left = e.clientX + 'px';
  clone.style.top = e.clientY + 'px';

  // Mark chip as dragging
  chip.classList.add('dragging');

  state.dragInfo = {
    word: word,
    sourceEl: chip,
    cloneEl: clone,
    startX: e.clientX,
    startY: e.clientY
  };

  // Add global listeners
  window.addEventListener('pointermove', onPointerMove, { passive: false });
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('pointercancel', onPointerUp);

  // Highlight blanks immediately
  highlightBlanks(true);
}

function onPointerMove(e) {
  if (!state.dragInfo) return;
  e.preventDefault();

  const clone = state.dragInfo.cloneEl;
  clone.style.left = e.clientX + 'px';
  clone.style.top = e.clientY + 'px';

  // Check if hovering over a blank
  const blankUnder = getBlankUnderPoint(e.clientX, e.clientY);
  clearBlankHighlights();
  if (blankUnder) {
    blankUnder.classList.add('drop-target');
  }
}

function onPointerUp(e) {
  if (!state.dragInfo) return;

  window.removeEventListener('pointermove', onPointerMove);
  window.removeEventListener('pointerup', onPointerUp);
  window.removeEventListener('pointercancel', onPointerUp);

  const clone = state.dragInfo.cloneEl;
  const word = state.dragInfo.word;

  // Check if dropped on a blank
  const blankUnder = getBlankUnderPoint(e.clientX, e.clientY);

  if (blankUnder) {
    const flatIdx = parseInt(blankUnder.dataset.flatIdx);
    if (!isNaN(flatIdx)) {
      // If blank already filled, return old word to bank first
      if (state.blanks[flatIdx].filled) {
        returnWordToBankSilent(flatIdx);
      }
      // Fill the blank
      state.blanks[flatIdx].filled = word;
      // Mark word bank item as used
      const bankItem = state.wordBank.find(w => w.word === word);
      if (bankItem) bankItem.used = true;
    }
  }

  // Cleanup
  state.dragInfo.sourceEl.classList.remove('dragging');
  clone.remove();
  state.dragInfo = null;

  clearBlankHighlights();
  highlightBlanks(false);

  // Re-render
  renderWordBank();
  renderQuestions();
}

function getBlankUnderPoint(x, y) {
  // Get all blank slots
  const blanks = document.querySelectorAll('.blank-slot');
  for (let i = blanks.length - 1; i >= 0; i--) {
    const rect = blanks[i].getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      // Only return empty blanks (or filled for swap)
      return blanks[i];
    }
  }
  return null;
}

function onBlankPointerUp(e) {
  if (state.submitted) return;
  // This is a click on an empty blank without dragging (do nothing for clicks)
  // The actual drop is handled in the global pointerup
}

function highlightBlanks(on) {
  if (on) {
    document.getElementById('wordBank').classList.add('highlight');
  } else {
    document.getElementById('wordBank').classList.remove('highlight');
  }
}

function clearBlankHighlights() {
  document.querySelectorAll('.blank-slot.drop-target').forEach(b => {
    b.classList.remove('drop-target');
  });
}

/* ═══════════════════════════════════════════════════════ */
/*              Return Word to Bank                       */
/* ═══════════════════════════════════════════════════════ */
function returnWordToBank(flatIdx) {
  if (state.submitted) return;
  returnWordToBankSilent(flatIdx);
  renderWordBank();
  renderQuestions();
}

function returnWordToBankSilent(flatIdx) {
  const blank = state.blanks[flatIdx];
  if (!blank || !blank.filled) return;
  const word = blank.filled;
  blank.filled = null;
  blank.correct = null;
  // Return to bank
  const bankItem = state.wordBank.find(w => w.word === word);
  if (bankItem) bankItem.used = false;
}

/* ═══════════════════════════════════════════════════════ */
/*              Submit & Grading                          */
/* ═══════════════════════════════════════════════════════ */
function submitAnswers() {
  if (state.submitted) return;

  // Grade each blank
  let correctCount = 0;
  state.blanks.forEach(b => {
    const userAnswer = (b.filled || '').toLowerCase().trim();
    const correctAnswer = b.answer.toLowerCase().trim();
    b.correct = (userAnswer === correctAnswer);
    if (b.correct) correctCount++;
  });

  state.submitted = true;
  const total = state.blanks.length;

  // Show score
  const scoreBar = document.getElementById('scoreBar');
  const scoreText = document.getElementById('scoreText');
  scoreBar.classList.add('visible');
  const pct = correctCount / total;
  if (pct === 1) {
    scoreText.textContent = `🎉 完美！${correctCount}/${total} 全部正确`;
    scoreText.className = 'score-text perfect';
  } else if (pct >= 0.6) {
    scoreText.textContent = `👍 不错！${correctCount}/${total} 正确`;
    scoreText.className = 'score-text good';
  } else {
    scoreText.textContent = `📚 ${correctCount}/${total} 正确，继续加油`;
    scoreText.className = 'score-text ok';
  }

  // Re-render — renderQuestions handles all correct/wrong CSS classes + translations
  renderQuestions();
  renderActions();

  // Scroll to top so user sees score bar in sticky header
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════════════ */
/*              Restart                                   */
/* ═══════════════════════════════════════════════════════ */
function restartQuiz() {
  // Keep current settings, just regenerate a fresh quiz
  document.getElementById('scoreBar').classList.remove('visible');
  document.getElementById('wordBank').innerHTML = '';
  document.getElementById('questionList').innerHTML = '';

  state.submitted = false;
  state.questions = [];
  state.blanks = [];
  state.wordBank = [];
  state.dragInfo = null;

  startQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════════════ */
/*              Init                                      */
/* ═══════════════════════════════════════════════════════ */
// Prevent default touch behavior for dragging
document.addEventListener('touchmove', function(e) {
  if (state.dragInfo) {
    e.preventDefault();
  }
}, { passive: false });

// Hints are only shown after submission — see renderQuestions()
</script>

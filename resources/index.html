<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources — DuckLing</title>
<link rel="icon" type="image/jpeg" href="../imgs/index/avatar.jpg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  :root {
    --bg: #08080a;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --surface: #111114;
    --border: rgba(255,255,255,0.06);
    --radius: 28px;
    --transition: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .main {
    position: relative;
    z-index: 1;
    flex: 1;
    width: 100%;
    max-width: 960px;
    padding: 40px 48px 0;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color var(--transition);
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  }
  .back-link:hover { color: var(--text-primary); }
  .back-link svg {
    width: 18px; height: 18px;
    transition: transform var(--transition);
  }
  .back-link:hover svg { transform: translateX(-3px); }

  .page-header {
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  }
  .page-header h1 {
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .page-header p {
    margin-top: 10px;
    font-size: 1.05rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .projects {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }

  .project-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: inherit;
    transition: all var(--transition);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .project-card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity var(--transition);
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .project-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .project-card:hover::after { opacity: 1; }
  .project-card:active { transform: scale(0.98); }

  .project-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .project-icon svg {
    width: 24px; height: 24px;
    color: var(--text-secondary);
  }

  .project-card h2 {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .project-card .desc {
    font-size: 0.92rem;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .project-card .meta {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .footer {
    margin-top: auto;
    padding: 48px 0 32px;
    font-size: 0.85rem;
    color: var(--text-tertiary);
    text-align: center;
    opacity: 0;
    animation: fadeIn 0.6s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
  }

  @media (max-width: 720px) {
    .main { padding: 48px 24px; gap: 40px; }
    .page-header h1 { font-size: 2rem; }
    .projects { grid-template-columns: 1fr; }
    .project-card { padding: 24px; }
  }
</style>
</head>
<body>

<main class="main">

  <a class="back-link" href="../index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Home
  </a>

  <header class="page-header">
    <h1>Resources</h1>
    <p>一些小工具和学习资源，随缘更新。</p>
  </header>

  <div class="projects">

    <a class="project-card" href="cloze/index.html">
      <div class="project-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <h2>英语选词填空</h2>
      <p class="desc">基于大学英语教材的选词填空与短语填空练习。随机出题，拖拽作答，即时批改，附带中文翻译。</p>
      <div class="meta">
        <span>40+ 词汇题</span>
        <span>30+ 短语题</span>
        <span>拖拽交互</span>
      </div>
    </a>

  </div>

  <footer class="footer">
    &copy; 2026 DuckLing &mdash; Built with care
  </footer>

</main>

</body>
</html>
